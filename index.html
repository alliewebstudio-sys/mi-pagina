<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BMW Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>BMW</h1>
    <nav>
        <a href="#">Inicio</a>
        <a href="#modelos">Modelos</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<section class="hero">
    <h2>El placer de conducir</h2>
    <button onclick="mostrarMensaje()">Descubrir más</button>
</section>

<section id="modelos" class="modelos">
    <h2>Modelos destacados</h2>

    <div class="card">
        <h3>BMW M4</h3>
        <p>Potencia y diseño deportivo.</p>
    </div>

    <div class="card">
        <h3>BMW i8</h3>
        <p>Innovación eléctrica y lujo.</p>
    </div>

    <div class="card">
        <h3>BMW X5</h3>
        <p>Comodidad y rendimiento SUV.</p>
    </div>
</section>

<section id="contacto" class="contacto">
    <h2>Contacto</h2>
    <input type="text" placeholder="Tu nombre">
    <button onclick="saludo()">Enviar</button>
</section>

<footer>
    <p>© 2026 BMW - Página ficticia</p>
</footer>

<script src="script.js"></script>
</body>
</html>
